version: 2

project_name: stream-share

builds:
  - binary: stream-share
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor
    goos:
      - windows
      - darwin
      - linux

    goarch:
      - amd64
      - arm64

archives:
  -
   format_overrides:
     - goos: windows
       formats: [ 'zip' ]

release:
  github:
    owner: x3n0n10
    name: stream-share
  draft: false

nfpms:
  -
   vendor: x3n0n10
   homepage: https://github.com/x3n0n10/stream-share
   maintainer: x3n0n10
   description: IPTV Proxy with LDAP support
   license: GPL-3.0
   formats:
     - deb
     - rpm

dockers_v2:
  - ids:
      - stream-share
    dockerfile: .Dockerfile.goreleaser
    images:
      - ghcr.io/x3n0n10/stream-share
      - x3n0n10/stream-share
    tags:
      - "{{ .Tag }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64/v8
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.name: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Version}}"
